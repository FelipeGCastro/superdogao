<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Dogao — Restaurante em Sao Vicente</title>
  <meta name="description" content="Super Dogao — Restaurante em Sao Vicente. Hot dogs, hamburgueres e muito mais. Faz ja o teu pedido!">
  <meta property="og:title" content="Super Dogao — Restaurante">
  <meta property="og:description" content="Os melhores cachorros de Sao Vicente. Faz ja o teu pedido!">
  <meta property="og:image" content="logo.png">
  <link rel="icon" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe8d6 100%);
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      max-width: 440px;
      width: 100%;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      transition: transform .2s;
    }

    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 1rem;
      border-radius: 50%;
      border: 3px solid #c0392b;
    }

    h1 {
      font-size: 1.75rem;
      color: #c0392b;
      margin-bottom: .3rem;
    }

    .tagline {
      font-size: .9rem;
      color: #888;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    .info-list {
      list-style: none;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .93rem;
      padding: .55rem .8rem;
      border-radius: .6rem;
      background: #fdf6f0;
      transition: background .2s;
    }

    .info-item:hover { background: #fceee3; }

    .info-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: #c0392b;
    }

    .info-item a {
      color: #2d2d2d;
      text-decoration: none;
      flex: 1;
      text-align: left;
    }

    .info-item a:hover { color: #c0392b; }

    .info-item span {
      flex: 1;
      text-align: left;
    }

    .btn-pedir {
      display: block;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 1rem;
      border-radius: .75rem;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      margin-bottom: 1rem;
      letter-spacing: .02em;
    }

    .btn-pedir:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(192,57,43,.35);
    }

    .btn-pedir:active { transform: translateY(0); }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: #c0392b;
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      padding: .4rem .8rem;
      border-radius: .5rem;
      transition: background .2s;
    }

    .social-link:hover { background: #fdf6f0; }

    .social-link svg {
      width: 18px;
      height: 18px;
    }

    .divider {
      height: 1px;
      background: #f0e6dc;
      margin: 1rem 0;
    }

    .schedule {
      margin-bottom: 1.5rem;
    }

    .schedule-title {
      font-size: .85rem;
      font-weight: 600;
      color: #c0392b;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .6rem;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .25rem .8rem;
      font-size: .88rem;
      text-align: left;
      padding: .6rem .8rem;
      background: #fdf6f0;
      border-radius: .6rem;
    }

    .schedule-grid .day { color: #555; }
    .schedule-grid .time { color: #2d2d2d; font-weight: 500; }
    .schedule-grid .closed { color: #c0392b; font-weight: 500; }
  </style>
</head>
<body>
  <main class="card">
    <img src="logo.png" alt="Super Dogao" class="logo">
    <h1>Super Dogao</h1>
    <p class="tagline">Os melhores cachorros de Sao Vicente</p>

    <ul class="info-list">
      <li class="info-item">

        <a href="tel:253061149">253 061 149</a>
      </li>
      <li class="info-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-6 18h6"/></svg>
        <a href="tel:939406887">939 406 887</a>
      </li>
    </ul>

    <div class="schedule">
      <p class="schedule-title">Horario</p>
      <div class="schedule-grid">
        <span class="day">Segunda</span><span class="closed">Encerrado</span>

        <span class="day">Sexta</span><span class="time">18h — 00h</span>

    </div>

  </main>
</body>
</html>
