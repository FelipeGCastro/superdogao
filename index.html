<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Dogão — Restaurante</title>
  <meta name="description" content="Super Dogão — Restaurante em São Vicente. Hot dogs, hambúrgueres e muito mais.">
  <link rel="icon" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff8f0;
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 420px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 1.5rem;
      border-radius: .75rem;
    }

    h1 {
      font-size: 1.6rem;
      color: #c0392b;
      margin-bottom: 1.5rem;
    }

    .info {
      list-style: none;
      margin-bottom: 1.5rem;
      line-height: 1.8;
      font-size: .95rem;
    }

    .info a {
      color: #c0392b;
      text-decoration: none;
    }

    .info a:hover { text-decoration: underline; }

    .btn {
      display: inline-block;
      background: #c0392b;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: .85rem 2.5rem;
      border-radius: .6rem;
      text-decoration: none;
      transition: background .2s;
      margin-bottom: 1rem;
    }

    .btn:hover { background: #a93226; }

    .social {
      margin-top: .5rem;
    }

    .social a {
      color: #c0392b;
      text-decoration: none;
      font-size: .9rem;
    }

    .social a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <img src="logo.png" alt="Super Dogão" class="logo">
    <h1>Super Dogão</h1>

    <ul class="info">
      <li>Av. General Norton de Matos, 120</li>
      <li>São Vicente</li>
      <li><a href="tel:253061149">253 061 149</a></li>
      <li><a href="tel:939406887">939 406 887</a></li>
    </ul>

    <a href="/pedir" class="btn">Fazer Pedido</a>

    <div class="social">
      <a href="https://www.instagram.com/superdogao.pt/" target="_blank" rel="noopener">
        Instagram @superdogao.pt
      </a>
    </div>
  </main>
</body>
</html>
